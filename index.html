<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Cruciverba" />
<meta name="theme-color" content="#E9E3D6" />
<meta name="description" content="Cruciverba italiano giocabile anche offline." />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon.svg" />
<title>Cruciverba</title>
<style>
  :root{
    --paper:#E9E3D6; --paper-2:#F4EFE4; --board:#DED6C4;
    --ink:#2A2722; --ink-soft:#766E60; --line:#C9C0AE;
    --hl-word:#F3DCA0; --hl-cell:#E9B85C; --accent:#C77A2B;
    --wrong:#C24A36; --right:#5E8C53;
    --font-ui:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    --font-cell:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
    --cell:34px; --radius:10px;
    --kbd-h:0px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    font-family:var(--font-ui); color:var(--ink); background:var(--paper);
    overflow:hidden; -webkit-text-size-adjust:100%; user-select:none; -webkit-user-select:none;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ---------- masthead ---------- */
  header{
    display:flex; align-items:center; gap:16px; padding:10px 16px 8px;
    border-bottom:1px solid var(--line); flex:0 0 auto;
  }
  .brand{display:flex; align-items:baseline; gap:10px; min-width:0;}
  .brand h1{
    margin:0; font-size:clamp(20px,3.4vw,30px); font-weight:800;
    letter-spacing:-0.04em; line-height:1; white-space:nowrap;
  }
  .brand h1 .dot{color:var(--accent);}
  .spacer{flex:1 1 auto;}
  .timer{
    font-family:var(--font-mono); font-size:15px; font-variant-numeric:tabular-nums;
    color:var(--ink-soft); padding:4px 8px; border:1px solid var(--line);
    border-radius:8px; background:var(--paper-2);
  }
  .timer.solved{color:var(--right); border-color:var(--right);}

  .seg{display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--paper-2);}
  .seg button{
    font-family:var(--font-ui); font-size:13px; font-weight:600; color:var(--ink-soft);
    background:transparent; border:0; padding:7px 11px; cursor:pointer;
  }
  .seg button[aria-pressed="true"]{background:var(--ink); color:var(--paper);}
  .seg button + button{border-left:1px solid var(--line);}

  .btn{
    font-family:var(--font-ui); font-size:14px; font-weight:600; cursor:pointer;
    color:var(--ink); background:var(--paper-2); border:1px solid var(--line);
    border-radius:9px; padding:8px 14px; white-space:nowrap;
  }
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .btn:focus-visible, .seg button:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .btn.icon{
    width:38px; height:38px; padding:0; display:inline-flex; align-items:center; justify-content:center;
    font-size:19px; line-height:1;
  }

  .menu-wrap{position:relative;}
  .menu{
    position:absolute; right:0; top:calc(100% + 6px); z-index:30;
    background:var(--paper-2); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 12px 30px rgba(42,39,34,.18); padding:6px; min-width:190px; display:none;
  }
  .menu.open{display:block;}
  .menu button{
    display:block; width:100%; text-align:left; font-size:14px; font-weight:500;
    background:transparent; border:0; border-radius:8px; padding:9px 11px; cursor:pointer; color:var(--ink);
  }
  .menu button:hover{background:var(--board);}
  .menu .sep{height:1px; background:var(--line); margin:5px 4px;}
  .menu button.danger{color:var(--wrong);}
  .menu .group{
    padding:8px 11px 4px; font-family:var(--font-mono); font-size:10px;
    letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft);
  }

  /* ---------- main ---------- */
  main{flex:1 1 auto; display:flex; min-height:0; overflow:hidden;}
  .grid-pane{
    flex:1 1 auto; min-width:0; display:flex; align-items:center; justify-content:center;
    padding:14px; overflow:hidden;
  }
  .board{
    display:grid; gap:2px; background:transparent;
    grid-auto-rows:var(--cell); justify-content:center;
  }
  .cell{
    width:var(--cell); height:var(--cell); position:relative;
    background:var(--paper-2); border:1px solid var(--line); border-radius:5px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-family:var(--font-cell); font-weight:600; color:var(--ink);
    font-size:calc(var(--cell)*0.56); line-height:1;
  }
  .cell.void{background:var(--ink); border-color:var(--ink); cursor:default; pointer-events:none;}
  .cell .num{
    position:absolute; top:1px; left:3px; font-family:var(--font-mono);
    font-size:calc(var(--cell)*0.27); color:var(--ink-soft); font-weight:500; pointer-events:none;
  }
  .cell.hl-word{background:var(--hl-word);}
  .cell.hl-cell{background:var(--hl-cell); box-shadow:inset 0 0 0 2px var(--accent);}
  .cell.wrong{color:var(--wrong);}
  .cell.wrong::after{
    content:""; position:absolute; inset:0; border-radius:5px;
    box-shadow:inset 0 0 0 2px var(--wrong);
  }
  .cell.revealed{color:var(--accent);}
  .cell .ltr{transition:transform .08s ease;}
  @media (prefers-reduced-motion:reduce){ .cell .ltr{transition:none;} }
  .cell.pop .ltr{transform:scale(1.18);}

  /* ---------- clue panel (lato destro, landscape) ---------- */
  .clue-pane{
    flex:0 0 clamp(280px,30%,400px); border-left:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0; background:var(--paper);
  }
  .clue-cols{flex:1 1 auto; display:flex; min-height:0;}
  .clue-col{flex:1 1 50%; display:flex; flex-direction:column; min-height:0; min-width:0;}
  .clue-col + .clue-col{border-left:1px solid var(--line);}
  .clue-col h2{
    margin:0; font-family:var(--font-mono); font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--ink-soft); padding:10px 12px 8px;
    border-bottom:1px solid var(--line); flex:0 0 auto;
  }
  .clue-list{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px 0;}
  .clue-item{
    display:flex; gap:8px; padding:7px 12px; cursor:pointer; font-size:13.5px; line-height:1.3;
    border-left:3px solid transparent;
  }
  .clue-item .cn{font-family:var(--font-mono); font-weight:600; color:var(--ink-soft); flex:0 0 auto; min-width:18px;}
  .clue-item.done .ct{color:var(--ink-soft); text-decoration:line-through;}
  .clue-item.active{background:var(--hl-word); border-left-color:var(--accent);}
  .clue-item:active{background:var(--board);}

  /* ---------- current clue bar + keyboard ---------- */
  .dock{flex:0 0 auto; border-top:1px solid var(--line); background:var(--paper);}
  .cluebar{
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    border-bottom:1px solid var(--line);
  }
  .cluebar .nav{
    flex:0 0 auto; width:38px; height:38px; border-radius:9px; border:1px solid var(--line);
    background:var(--paper-2); font-size:18px; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .cluebar .nav:active{transform:translateY(1px);}
  .cluebar .cur{flex:1 1 auto; min-width:0;}
  .cluebar .cur .meta{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--accent); margin-bottom:1px;
  }
  .cluebar .cur .txt{
    font-size:16px; font-weight:600; line-height:1.25;
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }

  .keyboard{padding:7px 6px 9px; display:flex; flex-direction:column; gap:6px;}
  .krow{display:flex; gap:5px; justify-content:center;}
  .key{
    flex:1 1 0; max-width:46px; height:clamp(40px,6.2vh,52px);
    border-radius:9px; border:1px solid var(--line); background:var(--paper-2);
    font-family:var(--font-cell); font-size:18px; font-weight:600; color:var(--ink);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 2px 0 var(--line);
  }
  .key:active{transform:translateY(2px); box-shadow:0 0 0 var(--line); background:var(--board);}
  .key.wide{flex:1.6 1 0; max-width:74px; font-size:16px;}
  .key.act{background:var(--ink); color:var(--paper); border-color:var(--ink); box-shadow:0 2px 0 #000;}
  .key:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  /* ---------- overlay loading + win ---------- */
  .overlay{
    position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(233,227,214,.82); backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex;}
  .card{
    background:var(--paper-2); border:1px solid var(--line); border-radius:18px;
    padding:26px 30px; text-align:center; box-shadow:0 18px 50px rgba(42,39,34,.2); max-width:340px;
  }
  .card h3{margin:0 0 6px; font-size:22px; letter-spacing:-0.02em;}
  .card p{margin:0 0 16px; color:var(--ink-soft); font-size:14px; line-height:1.4;}
  .card-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .spinner{
    width:34px; height:34px; margin:0 auto 14px; border-radius:50%;
    border:3px solid var(--line); border-top-color:var(--accent); animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){ .spinner{animation:none;} }

  .toast{
    position:fixed; left:50%; bottom:calc(var(--kbd-h) + 18px); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--paper); padding:10px 16px; border-radius:10px; font-size:14px;
    opacity:0; transition:opacity .2s, transform .2s; z-index:40; pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .update-bar{
    position:fixed; left:50%; bottom:calc(var(--kbd-h) + 18px); z-index:60;
    transform:translateX(-50%) translateY(20px); display:flex; align-items:center; gap:10px;
    max-width:min(92vw,420px); padding:10px 10px 10px 14px;
    background:var(--ink); color:var(--paper); border:1px solid rgba(244,239,228,.28);
    border-radius:12px; box-shadow:0 12px 30px rgba(42,39,34,.24);
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .update-bar.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .update-bar span{font-size:14px; font-weight:600; line-height:1.25;}
  .update-bar button{
    border:1px solid var(--paper); border-radius:9px; background:var(--paper); color:var(--ink);
    padding:7px 10px; font:600 13px var(--font-ui); cursor:pointer; white-space:nowrap;
  }

  /* ---------- responsive: portrait / stretto ---------- */
  .clue-toggle{display:none;}
  @media (max-aspect-ratio:1/1), (max-width:760px){
    main{flex-direction:column;}
    .clue-pane{
      flex:0 0 auto; border-left:0; border-top:1px solid var(--line);
      position:fixed; left:0; right:0; bottom:0; top:0; z-index:45;
      transform:translateY(100%); transition:transform .25s ease; background:var(--paper);
    }
    .clue-pane.open{transform:translateY(0);}
    .clue-pane .closebar{
      display:flex; align-items:center; justify-content:space-between; padding:12px 14px;
      border-bottom:1px solid var(--line);
    }
    .clue-pane .closebar strong{font-size:16px;}
    .clue-toggle{display:flex;}
  }
  @media not all and (max-aspect-ratio:1/1){
    @media (min-width:761px){ .clue-pane .closebar{display:none;} }
  }
  .clue-pane .closebar{display:none;}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Cruciverba<span class="dot">.</span></h1>
    </div>
    <div class="spacer"></div>
    <div class="timer" id="timer">00:00</div>
    <div class="menu-wrap">
      <button class="btn primary" id="newBtn" aria-haspopup="true">Nuovo ▾</button>
      <div class="menu" id="newMenu" role="menu">
        <button data-size="s5">5x5</button>
        <button data-size="s7">7x7</button>
        <button data-size="s9">9x9</button>
        <button data-size="s11">11x11</button>
        <button data-size="s13">13x13</button>
        <div class="sep"></div>
        <button data-size="l7x11">11x7</button>
        <button data-size="l9x13">13x9</button>
        <button data-size="l11x17">17x11</button>
        <button data-size="l13x21">21x13</button>
        <button data-size="l13x25">25x13</button>
      </div>
    </div>
    <button class="btn clue-toggle" id="clueToggle">Definizioni</button>
    <div class="menu-wrap">
      <button class="btn icon" id="helpBtn" aria-haspopup="true" aria-label="Aiuti" title="Aiuti">🛟</button>
      <div class="menu" id="helpMenu" role="menu">
        <button data-act="check">Verifica</button>
        <button data-act="reveal-letter">Rivela lettera</button>
        <button data-act="reveal-word">Rivela parola</button>
        <div class="sep"></div>
        <button data-act="solve">Mostra soluzione</button>
        <button data-act="clear" class="danger">Cancella tutto</button>
      </div>
    </div>
  </header>

  <main>
    <div class="grid-pane">
      <div class="board" id="board" role="grid" aria-label="Griglia del cruciverba"></div>
    </div>
    <aside class="clue-pane" id="cluePane">
      <div class="closebar">
        <strong>Definizioni</strong>
        <button class="btn" id="clueClose">Chiudi</button>
      </div>
      <div class="clue-cols">
        <div class="clue-col">
          <h2>Orizzontali</h2>
          <div class="clue-list" id="acrossList"></div>
        </div>
        <div class="clue-col">
          <h2>Verticali</h2>
          <div class="clue-list" id="downList"></div>
        </div>
      </div>
    </aside>
  </main>

  <div class="dock">
    <div class="cluebar">
      <button class="nav" id="prevClue" aria-label="Definizione precedente">‹</button>
      <div class="cur">
        <div class="meta" id="curMeta">—</div>
        <div class="txt" id="curTxt">Premi “Nuovo” per generare un cruciverba</div>
      </div>
      <button class="nav" id="nextClue" aria-label="Definizione successiva">›</button>
    </div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="overlayCard">
      <div class="spinner" id="spinner"></div>
      <h3 id="ovTitle">Genero il cruciverba…</h3>
      <p id="ovText">Sto incastrando le parole. Ci vuole solo un istante.</p>
      <div class="card-actions">
        <button class="btn" id="ovCloseBtn" style="display:none">Chiudi</button>
        <button class="btn primary" id="ovBtn" style="display:none">Nuovo cruciverba</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="update-bar" id="updateBar" role="status" aria-live="polite">
    <span>Nuova versione disponibile</span>
    <button type="button" id="updateBtn">Aggiorna</button>
  </div>

  <!-- ===================== APP (thread principale) ===================== -->
  <script>
  "use strict";
  (function(){
    var $ = function(id){ return document.getElementById(id); };
    var GENERATOR_VERSION = "pattern-v2";
    // --- generatore denso in Web Worker ---
    var worker = new Worker("./gen_dense.js?v="+GENERATOR_VERSION);

    var SIZES = {
      s5:    { width:5,  height:5,  label:"5x5" },
      s7:    { width:7,  height:7,  label:"7x7" },
      s9:    { width:9,  height:9,  label:"9x9" },
      s11:   { width:11, height:11, label:"11x11" },
      s13:   { width:13, height:13, label:"13x13" },
      l7x11: { width:11, height:7,  label:"11x7" },
      l9x13: { width:13, height:9,  label:"13x9" },
      l11x17:{ width:17, height:11, label:"17x11" },
      l13x21:{ width:21, height:13, label:"21x13" },
      l13x25:{ width:25, height:13, label:"25x13" }
    };
    var sizeKey = "s11";

    var puzzle = null;          // { width,height,cells,across,down }
    var userGrid = null;        // matrice di lettere inserite
    var checked = null;         // matrice bool: cella verificata sbagliata
    var revealed = null;        // matrice bool: cella rivelata
    var active = null;          // { r, c, dir }  dir: 0 oriz, 1 vert
    var words = [];             // tutte le parole, ognuna con .cells [{r,c}]
    var cellEls = [];           // riferimenti DOM
    var cellWords = [];         // per ogni cella: { 0:wordAcross, 1:wordDown }
    var solved = false;
    var timer = { start:0, elapsed:0, id:null };
    var dbEntries = null;
    var dbPromise = null;
    var STATE_KEY = "cruci_state_dense_v2";

    // ---------- timer ----------
    function fmt(ms){ var s=Math.floor(ms/1000); var m=Math.floor(s/60); s=s%60; return (m<10?"0":"")+m+":"+(s<10?"0":"")+s; }
    function startTimer(){ stopTimer(); timer.start=Date.now()-timer.elapsed; timer.id=setInterval(function(){ timer.elapsed=Date.now()-timer.start; $("timer").textContent=fmt(timer.elapsed); },500); }
    function stopTimer(){ if(timer.id){ clearInterval(timer.id); timer.id=null; } }
    function resetTimer(){ stopTimer(); timer.elapsed=0; $("timer").textContent="00:00"; $("timer").classList.remove("solved"); }

    // ---------- generazione ----------
    function showOverlay(loading){
      var ov=$("overlay"); ov.classList.add("show");
      $("spinner").style.display = loading? "block":"none";
      $("ovCloseBtn").style.display = loading? "none":"inline-block";
      $("ovBtn").style.display = loading? "none":"inline-block";
    }
    function hideOverlay(){ $("overlay").classList.remove("show"); }

    function loadDb(){
      if(dbEntries) return Promise.resolve(dbEntries);
      if(dbPromise) return dbPromise;

      dbPromise = fetch("./cruciverba_db.json", { cache:"no-store" })
        .then(function(res){
          if(!res.ok) throw new Error("DB non disponibile");
          return res.json();
        })
        .then(function(entries){
          if(!Array.isArray(entries) || !entries.length) throw new Error("DB non valido");
          dbEntries = entries;
          return dbEntries;
        })
        .catch(function(err){
          dbPromise = null;
          throw err;
        });
      return dbPromise;
    }

    function newPuzzle(){
      showOverlay(true);
      $("ovTitle").textContent="Genero il cruciverba…";
      $("ovText").textContent="Sto incastrando le parole. Ci vuole solo un istante.";
      var opts = makeOptions(sizeKey);
      loadDb().then(function(entries){
        // il lavoro pesante avviene nel worker: il thread principale resta fluido
        worker.postMessage({ entries: entries, opts: opts });
      }).catch(function(){
        $("ovTitle").textContent="Database non disponibile";
        $("ovText").textContent="Apri l app una volta online per salvare le voci offline.";
        showOverlay(false);
      });
    }

    function makeOptions(key){
      var s = SIZES[key] || SIZES.s11;
      var cells = s.width * s.height;
      var longSide = Math.max(s.width, s.height);
      var small = cells <= 49;
      var large = cells >= 160;
      var veryLarge = cells >= 250;
      return {
        seed:(Date.now()>>>0),
        width:s.width,
        height:s.height,
        blackProb: small ? 0.07 : (large ? 0.12 : 0.10),
        maxRun: longSide <= 7 ? 5 : 7,
        patternAttempts: small ? 520 : (large ? (veryLarge ? 140 : 400) : 420),
        fillBudget: small ? 26000 : (large ? (veryLarge ? 32000 : 36000) : 32000),
        sampleTarget: veryLarge ? 1 : 3,
        minLen:2,
        maxLen: Math.min(18, longSide),
        minFallbackSide:5
      };
    }

    worker.onmessage = function(e){
      var d = e.data;
      if(!d.ok || !d.puzzle){
        $("ovTitle").textContent="Qualcosa non ha funzionato";
        $("ovText").textContent="Non sono riuscito a comporre la griglia. Riprova.";
        showOverlay(false);
        return;
      }
      puzzle = d.puzzle;
      buildState();
      buildBoard();
      buildClueLists();
      hideOverlay();
      resetTimer(); startTimer();
      solved=false;
      // seleziona la prima definizione orizzontale
      var first = puzzle.across[0] || puzzle.down[0];
      if(first) selectWord(findWord(first.row, first.col, puzzle.across.indexOf(first)>=0?0:1), 0);
      save();
    };
    worker.onerror = function(){
      $("ovTitle").textContent="Errore nel generatore";
      $("ovText").textContent="Riprova a generare un nuovo cruciverba.";
      showOverlay(false);
    };

    // ---------- costruzione stato ----------
    function buildState(){
      var H=puzzle.height, W=puzzle.width;
      userGrid=[]; checked=[]; revealed=[];
      for(var r=0;r<H;r++){ userGrid.push(new Array(W).fill("")); checked.push(new Array(W).fill(false)); revealed.push(new Array(W).fill(false)); }
      // costruisci elenco parole con celle e mappa cella->parola
      words=[]; cellWords=[];
      for(var r2=0;r2<H;r2++){ cellWords.push([]); for(var c2=0;c2<W;c2++) cellWords[r2].push({}); }
      function addWords(list, dir){
        list.forEach(function(w){
          var cells=[];
          for(var k=0;k<w.len;k++){
            var rr=w.row+(dir===1?k:0), cc=w.col+(dir===0?k:0);
            cells.push({r:rr,c:cc});
            cellWords[rr][cc][dir]=w;
          }
          w.dir=dir; w.cells=cells;
          words.push(w);
        });
      }
      addWords(puzzle.across,0);
      addWords(puzzle.down,1);
    }

    function findWord(r,c,dir){ return (cellWords[r] && cellWords[r][c]) ? cellWords[r][c][dir] : null; }

    // ---------- griglia ----------
    function fitCell(){
      if(!puzzle) return;
      var pane=document.querySelector(".grid-pane");
      var availW=pane.clientWidth-28, availH=pane.clientHeight-28;
      var gap=2;
      var byW=Math.floor((availW-(puzzle.width-1)*gap)/puzzle.width);
      var byH=Math.floor((availH-(puzzle.height-1)*gap)/puzzle.height);
      var size=Math.max(20, Math.min(byW, byH, 58));
      document.documentElement.style.setProperty("--cell", size+"px");
    }

    function buildBoard(){
      var board=$("board"); board.innerHTML="";
      board.style.gridTemplateColumns="repeat("+puzzle.width+", var(--cell))";
      cellEls=[];
      for(var r=0;r<puzzle.height;r++){
        cellEls.push([]);
        for(var c=0;c<puzzle.width;c++){
          var cellData=puzzle.cells[r][c];
          var el=document.createElement("div");
          if(!cellData){ el.className="cell void"; }
          else{
            el.className="cell";
            if(cellData.num){ var n=document.createElement("span"); n.className="num"; n.textContent=cellData.num; el.appendChild(n); }
            var ltr=document.createElement("span"); ltr.className="ltr"; el.appendChild(ltr);
            (function(rr,cc){ el.addEventListener("click", function(){ onCellTap(rr,cc); }); })(r,c);
          }
          board.appendChild(el);
          cellEls[r].push(el);
        }
      }
      fitCell();
      renderLetters();
    }

    function renderLetters(){
      for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++){
        if(!puzzle.cells[r][c]) continue;
        var el=cellEls[r][c]; var ltr=el.querySelector(".ltr");
        ltr.textContent=userGrid[r][c]||"";
        el.classList.toggle("wrong", !!checked[r][c]);
        el.classList.toggle("revealed", !!revealed[r][c] && !checked[r][c]);
      }
    }

    // ---------- selezione ----------
    function onCellTap(r,c){
      if(!puzzle || !puzzle.cells[r][c]) return;
      var hasA=!!cellWords[r][c][0], hasD=!!cellWords[r][c][1];
      var dir;
      if(active && active.r===r && active.c===c){ dir = (active.dir===0 && hasD)?1:((active.dir===1 && hasA)?0:active.dir); }
      else { dir = active ? (cellWords[r][c][active.dir]?active.dir:(hasA?0:1)) : (hasA?0:1); }
      if(dir===0 && !hasA) dir=1; if(dir===1 && !hasD) dir=0;
      active={r:r,c:c,dir:dir};
      refreshHighlight();
    }

    function selectWord(w, cellIndex){
      if(!w) return;
      var idx = (typeof cellIndex==="number")? cellIndex : firstEmptyIndex(w);
      var cell=w.cells[Math.max(0,idx)];
      active={r:cell.r,c:cell.c,dir:w.dir};
      refreshHighlight();
    }

    function firstEmptyIndex(w){
      for(var i=0;i<w.cells.length;i++){ var cl=w.cells[i]; if(!userGrid[cl.r][cl.c]) return i; }
      return 0;
    }

    function currentWord(){ return active? cellWords[active.r][active.c][active.dir] : null; }

    function refreshHighlight(){
      // pulisci
      for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++){
        if(!puzzle.cells[r][c]) continue;
        cellEls[r][c].classList.remove("hl-word","hl-cell");
      }
      var w=currentWord();
      if(w){ w.cells.forEach(function(cl){ cellEls[cl.r][cl.c].classList.add("hl-word"); }); }
      if(active){ cellEls[active.r][active.c].classList.remove("hl-word"); cellEls[active.r][active.c].classList.add("hl-cell"); }
      updateClueBar();
      highlightClueItem();
      scrollClueIntoView();
    }

    // ---------- barra definizione corrente + liste ----------
    function updateClueBar(){
      var w=currentWord();
      if(!w){ $("curMeta").textContent="—"; $("curTxt").textContent="Tocca una casella"; return; }
      $("curMeta").textContent = w.num+" "+(w.dir===0?"Orizzontale":"Verticale")+" · "+w.len+" lettere";
      $("curTxt").textContent = w.clue;
    }

    function buildClueLists(){
      var aL=$("acrossList"), dL=$("downList"); aL.innerHTML=""; dL.innerHTML="";
      function row(w, list){
        var it=document.createElement("div"); it.className="clue-item"; it.dataset.dir=w.dir; it.dataset.num=w.num;
        it.innerHTML='<span class="cn">'+w.num+'</span><span class="ct">'+escapeHtml(w.clue)+'</span>';
        it.addEventListener("click", function(){ selectWord(w); closeCluePaneMobile(); });
        list.appendChild(it);
        w._el=it;
      }
      puzzle.across.forEach(function(w){ row(w,aL); });
      puzzle.down.forEach(function(w){ row(w,dL); });
    }

    function highlightClueItem(){
      words.forEach(function(w){ if(w._el) w._el.classList.remove("active"); });
      var w=currentWord(); if(w && w._el) w._el.classList.add("active");
    }
    function scrollClueIntoView(){
      var w=currentWord(); if(w && w._el && w._el.scrollIntoView) w._el.scrollIntoView({block:"nearest"});
    }

    function markDoneClues(){
      words.forEach(function(w){
        if(!w._el) return;
        var full=w.cells.every(function(cl){ return userGrid[cl.r][cl.c]===puzzle.cells[cl.r][cl.c].ch; });
        w._el.classList.toggle("done", full);
      });
    }

    // ---------- input ----------
    function typeLetter(ch){
      if(!active || solved) return;
      var r=active.r, c=active.c;
      if(revealed[r][c]){ toast("Lettera rivelata"); return; }
      userGrid[r][c]=ch; checked[r][c]=false; revealed[r][c]=false;
      var el=cellEls[r][c]; var ltr=el.querySelector(".ltr"); ltr.textContent=ch;
      el.classList.remove("wrong","revealed");
      el.classList.add("pop"); setTimeout(function(){ el.classList.remove("pop"); },90);
      advance();
      afterChange();
    }
    function advance(){
      var w=currentWord(); if(!w) return;
      var i=indexInWord(w, active.r, active.c);
      for(var k=i+1;k<w.cells.length;k++){ var cl=w.cells[k]; if(!revealed[cl.r][cl.c]){ active={r:cl.r,c:cl.c,dir:w.dir}; refreshHighlight(); return; } }
      // fine parola: resta sull'ultima
      refreshHighlight();
    }
    function backspace(){
      if(!active || solved) return;
      var r=active.r, c=active.c;
      if(revealed[r][c]){ toast("Lettera rivelata"); return; }
      if(userGrid[r][c]){ userGrid[r][c]=""; cellEls[r][c].querySelector(".ltr").textContent=""; checked[r][c]=false; cellEls[r][c].classList.remove("wrong","revealed"); }
      else {
        var w=currentWord(); if(w){ var i=indexInWord(w,r,c); for(var k=i-1;k>=0;k--){ var cl=w.cells[k]; if(!revealed[cl.r][cl.c]){ active={r:cl.r,c:cl.c,dir:w.dir}; userGrid[cl.r][cl.c]=""; cellEls[cl.r][cl.c].querySelector(".ltr").textContent=""; checked[cl.r][cl.c]=false; cellEls[cl.r][cl.c].classList.remove("wrong","revealed"); break; } } }
      }
      refreshHighlight(); afterChange();
    }
    function indexInWord(w,r,c){ for(var i=0;i<w.cells.length;i++) if(w.cells[i].r===r && w.cells[i].c===c) return i; return 0; }

    function afterChange(){ markDoneClues(); checkWin(); save(); }

    // ---------- navigazione definizioni ----------
    function gotoClue(delta){
      var w=currentWord(); var idx = w? words.indexOf(w) : -1;
      var ordered = puzzle.across.concat(puzzle.down);
      var oi = w? ordered.indexOf(w) : -1;
      var ni = (oi + delta + ordered.length) % ordered.length;
      selectWord(ordered[ni]);
    }

    // ---------- verifica / rivela ----------
    function doCheck(){
      if(!puzzle) return; var wrong=0, any=false;
      for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++){
        if(!puzzle.cells[r][c]) continue;
        if(userGrid[r][c]){ any=true; checked[r][c]=(userGrid[r][c]!==puzzle.cells[r][c].ch); if(checked[r][c]) wrong++; }
      }
      renderLetters();
      toast(!any? "Compila qualche casella" : (wrong===0? "Tutto corretto finora!" : (wrong+" "+(wrong===1?"lettera sbagliata":"lettere sbagliate"))));
    }
    function revealCells(cells, opts){
      cells.forEach(function(cl){ userGrid[cl.r][cl.c]=puzzle.cells[cl.r][cl.c].ch; revealed[cl.r][cl.c]=true; checked[cl.r][cl.c]=false; });
      renderLetters();
      if(opts && opts.skipWin){ markDoneClues(); save(); }
      else afterChange();
    }
    function revealLetter(){ if(active) revealCells([{r:active.r,c:active.c}]); }
    function revealWord(){ var w=currentWord(); if(w) revealCells(w.cells); }
    function solveAll(){
      var all=[]; for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++) if(puzzle.cells[r][c]) all.push({r:r,c:c});
      revealCells(all, { skipWin:true });
      solved=true; stopTimer(); $("timer").classList.add("solved");
      toast("Soluzione mostrata");
    }
    function clearAll(){
      for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++){
        if(!puzzle.cells[r][c] || revealed[r][c]) continue;
        userGrid[r][c]=""; checked[r][c]=false;
      }
      renderLetters(); markDoneClues(); save(); toast("Griglia svuotata");
    }

    function checkWin(){
      if(solved || !puzzle) return;
      for(var r=0;r<puzzle.height;r++) for(var c=0;c<puzzle.width;c++){
        if(!puzzle.cells[r][c]) continue;
        if(userGrid[r][c]!==puzzle.cells[r][c].ch) return;
      }
      solved=true; stopTimer(); $("timer").classList.add("solved");
      $("ovTitle").textContent="Completato! 🎉";
      $("ovText").textContent="Hai risolto il cruciverba in "+fmt(timer.elapsed)+".";
      showOverlay(false);
    }

    // ---------- tastiera su schermo ----------
    function buildKeyboard(){
      var rows=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Z","X","C","V","B","N","M"]];
      var kb=$("keyboard"); kb.innerHTML="";
      rows.forEach(function(row, ri){
        var rd=document.createElement("div"); rd.className="krow";
        if(ri===2){ var dirk=mkKey("⇄","wide"); dirk.addEventListener("click", toggleDir); rd.appendChild(dirk); }
        row.forEach(function(ch){ var k=mkKey(ch,""); k.addEventListener("click", function(){ typeLetter(ch); }); rd.appendChild(k); });
        if(ri===2){ var bk=mkKey("⌫","wide"); bk.addEventListener("click", backspace); rd.appendChild(bk); }
        kb.appendChild(rd);
      });
      requestAnimationFrame(setKbHeightVar);
    }
    function mkKey(label, cls){ var k=document.createElement("button"); k.className="key"+(cls?(" "+cls):""); k.type="button"; k.textContent=label; return k; }
    function toggleDir(){ if(!active) return; var r=active.r,c=active.c; var other=active.dir===0?1:0; if(cellWords[r][c][other]){ active.dir=other; refreshHighlight(); } }
    function setKbHeightVar(){ var dock=document.querySelector(".dock"); if(dock) document.documentElement.style.setProperty("--kbd-h", dock.offsetHeight+"px"); }

    // tastiera fisica (utile su iPad con Magic Keyboard / desktop)
    window.addEventListener("keydown", function(e){
      if($("overlay").classList.contains("show") && $("ovBtn").style.display==="none") return;
      var k=e.key;
      if(k==="Escape" && $("overlay").classList.contains("show")){ hideOverlay(); e.preventDefault(); return; }
      if(/^[a-zA-Z]$/.test(k)){ typeLetter(k.toUpperCase()); e.preventDefault(); }
      else if(k==="Backspace"){ backspace(); e.preventDefault(); }
      else if(k==="ArrowLeft"||k==="ArrowRight"||k==="ArrowUp"||k==="ArrowDown"){ moveArrow(k); e.preventDefault(); }
      else if(k==="Tab"){ gotoClue(e.shiftKey?-1:1); e.preventDefault(); }
      else if(k===" "){ toggleDir(); e.preventDefault(); }
    });
    function moveArrow(k){
      if(!active) return; var r=active.r,c=active.c;
      var dr=k==="ArrowUp"?-1:k==="ArrowDown"?1:0, dc=k==="ArrowLeft"?-1:k==="ArrowRight"?1:0;
      var nr=r+dr, nc=c+dc;
      while(nr>=0&&nr<puzzle.height&&nc>=0&&nc<puzzle.width){
        if(puzzle.cells[nr][nc]){ var wantDir=(dr!==0)?1:0; active={r:nr,c:nc,dir:cellWords[nr][nc][wantDir]?wantDir:(cellWords[nr][nc][0]?0:1)}; refreshHighlight(); return; }
        nr+=dr; nc+=dc;
      }
    }

    // ---------- persistenza (best-effort) ----------
    function save(){
      try{
        if(!puzzle) return;
        var data={ puzzle:puzzle, userGrid:userGrid, revealed:revealed, elapsed:timer.elapsed, sizeKey:sizeKey, solved:solved, generatorVersion:GENERATOR_VERSION };
        localStorage.setItem(STATE_KEY, JSON.stringify(data));
      }catch(e){}
    }
    function load(){
      try{
        var raw=localStorage.getItem(STATE_KEY); if(!raw) return false;
        var data=JSON.parse(raw); if(!data || !data.puzzle) return false;
        if(data.generatorVersion !== GENERATOR_VERSION) return false;
        sizeKey=data.sizeKey || ({ facile:"s9", medio:"s11", difficile:"s13" })[data.difficulty] || "s11";
        puzzle=data.puzzle; buildState();
        userGrid=data.userGrid||userGrid; revealed=data.revealed||revealed;
        buildBoard(); buildClueLists(); renderLetters(); markDoneClues();
        timer.elapsed=data.elapsed||0; $("timer").textContent=fmt(timer.elapsed);
        solved=!!data.solved; if(solved) $("timer").classList.add("solved"); else startTimer();
        var first=puzzle.across[0]||puzzle.down[0]; if(first) selectWord(first);
        return true;
      }catch(e){ return false; }
    }

    // ---------- util ----------
    function escapeHtml(s){ return String(s).replace(/[&<>"]/g,function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]; }); }
    var toastT=null;
    function toast(msg){ var t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove("show"); },1700); }
    function closeCluePaneMobile(){ $("cluePane").classList.remove("open"); }

    // ---------- PWA / aggiornamenti ----------
    function setupPwa(){
      var refreshing=false;
      var updateBar=$("updateBar");
      var updateBtn=$("updateBtn");
      var waitingWorker=null;
      var updateReady=false;

      function showUpdate(worker){
        if(worker) waitingWorker=worker;
        updateReady=true;
        updateBar.classList.add("show");
      }
      function applyUpdate(){
        if(waitingWorker) waitingWorker.postMessage({ type:"SKIP_WAITING" });
        else if(updateReady) window.location.reload();
      }
      function checkVersion(){
        fetch("./version.json?t="+Date.now(), { cache:"no-store" })
          .then(function(res){ return res.ok ? res.json() : null; })
          .then(function(info){
            if(!info || !info.version) return;
            var last=localStorage.getItem("cruci_app_version");
            if(last && last!==info.version) showUpdate(null);
            localStorage.setItem("cruci_app_version", info.version);
          })
          .catch(function(){});
      }

      updateBtn.addEventListener("click", applyUpdate);
      checkVersion();
      setInterval(checkVersion, 30*60*1000);

      if(!("serviceWorker" in navigator)) return;

      navigator.serviceWorker.addEventListener("controllerchange", function(){
        if(refreshing) return;
        refreshing=true;
        window.location.reload();
      });

      navigator.serviceWorker.register("./sw.js").then(function(reg){
        if(reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);

        reg.addEventListener("updatefound", function(){
          var worker=reg.installing;
          if(!worker) return;
          worker.addEventListener("statechange", function(){
            if(worker.state==="installed" && navigator.serviceWorker.controller) showUpdate(worker);
          });
        });

        function checkForUpdate(){ reg.update().catch(function(){}); }
        checkForUpdate();
        setInterval(checkForUpdate, 30*60*1000);
      }).catch(function(){});
    }

    // ---------- eventi UI ----------
    var newBtn=$("newBtn"), newMenu=$("newMenu");
    newBtn.addEventListener("click", function(e){ e.stopPropagation(); helpMenu.classList.remove("open"); newMenu.classList.toggle("open"); });
    newMenu.addEventListener("click", function(e){
      var key=e.target.dataset.size; if(!key) return;
      sizeKey=key;
      newMenu.classList.remove("open");
      newPuzzle();
    });
    $("ovBtn").addEventListener("click", newPuzzle);
    $("ovCloseBtn").addEventListener("click", hideOverlay);
    $("prevClue").addEventListener("click", function(){ gotoClue(-1); });
    $("nextClue").addEventListener("click", function(){ gotoClue(1); });
    $("clueToggle").addEventListener("click", function(){ $("cluePane").classList.add("open"); });
    $("clueClose").addEventListener("click", closeCluePaneMobile);

    var helpBtn=$("helpBtn"), helpMenu=$("helpMenu");
    helpBtn.addEventListener("click", function(e){ e.stopPropagation(); newMenu.classList.remove("open"); helpMenu.classList.toggle("open"); });
    document.addEventListener("click", function(){ newMenu.classList.remove("open"); helpMenu.classList.remove("open"); });
    helpMenu.addEventListener("click", function(e){
      var act=e.target.dataset.act; if(!act) return; helpMenu.classList.remove("open");
      if(act==="check") doCheck();
      else if(act==="reveal-letter") revealLetter();
      else if(act==="reveal-word") revealWord();
      else if(act==="solve") solveAll();
      else if(act==="clear") clearAll();
    });

    window.addEventListener("resize", function(){ fitCell(); setKbHeightVar(); });
    window.addEventListener("orientationchange", function(){ setTimeout(function(){ fitCell(); setKbHeightVar(); }, 300); });

    // ---------- avvio ----------
    buildKeyboard();
    setupPwa();
    if(!load()){ newPuzzle(); }
  })();
  </script>
</body>
</html>
